<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Gästeliste</title>
  <style>
    :root {
      --accent: #ffb347;
      --accent-glow: rgba(255,179,71,0.2);
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #loginScreen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 40px 36px; width: 100%; max-width: 360px; text-align: center;
    }
    .login-box h1 { font-size: 1.4rem; font-weight: 300; letter-spacing: 3px; color: var(--accent); margin-bottom: 8px; }
    .login-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 11px 14px; background: #000; border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 14px;
      transition: border 0.25s;
    }
    .login-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn {
      width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px;
      color: #000; font-size: 0.97rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 10px; display: none; }

    /* Dashboard */
    #dashboard { display: none; padding: 30px 20px 60px; max-width: 900px; margin: 0 auto; }

    header { margin-bottom: 28px; }
    header h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: 3px; color: var(--accent); }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

    /* Stat Cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; text-align: center;
    }
    .stat-val { font-size: 2rem; font-weight: 300; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input {
      flex: 1; min-width: 180px; padding: 9px 14px; background: #000; border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 0.9rem;
    }
    .toolbar input:focus { outline: none; border-color: var(--accent); }
    .filter-btn {
      padding: 9px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .refresh-btn {
      padding: 9px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Tabelle */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead { background: #1a1a1a; }
    th { padding: 12px 16px; text-align: left; color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    td { padding: 12px 16px; border-top: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: rgba(255,179,71,0.04); }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-ja { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .badge-nein { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }

    .essen-tag {
      display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem;
      background: rgba(255,179,71,0.1); color: var(--accent); border: 1px solid rgba(255,179,71,0.2);
    }

    .muted-cell { color: var(--muted); font-style: italic; }
    .date-cell { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    .empty { text-align: center; padding: 50px; color: var(--muted); font-size: 0.95rem; }
    .loading { text-align: center; padding: 50px; color: var(--muted); }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <h1>ADMIN</h1>
    <p>Gästeliste · Gartenfest 2026</p>
    <input type="password" id="pwInput" placeholder="Passwort" autocomplete="current-password">
    <button class="btn" id="loginBtn">Anmelden</button>
    <p class="error-msg" id="errorMsg">Falsches Passwort</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <h1>GÄSTELISTE</h1>
    <p>Gartenfest · 04. Juli 2026</p>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="statGesamt">–</div><div class="stat-label">Antworten</div></div>
    <div class="stat"><div class="stat-val" id="statZusagen">–</div><div class="stat-label">Zusagen</div></div>
    <div class="stat"><div class="stat-val" id="statPersonen">–</div><div class="stat-label">Personen</div></div>
    <div class="stat"><div class="stat-val" id="statAbsagen">–</div><div class="stat-label">Absagen</div></div>
    <div class="stat"><div class="stat-val" id="statVeg">–</div><div class="stat-label">Vegetarisch</div></div>
    <div class="stat"><div class="stat-val" id="statVegan">–</div><div class="stat-label">Vegan</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Nach Name suchen …">
    <button class="filter-btn active" data-filter="alle">Alle</button>
    <button class="filter-btn" data-filter="Zusage">Zusagen</button>
    <button class="filter-btn" data-filter="Absage">Absagen</button>
    <button class="refresh-btn" id="refreshBtn">↻ Aktualisieren</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Personen</th>
          <th>Ernährung</th>
          <th>Allergien</th>
          <th>Nachricht</th>
          <th>Angemeldet</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="loading">Lade Daten …</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ── Konfiguration ─────────────────────────────────────────
  const PASSWORT = "Knut2026";   // ← hier dein Wunschpasswort eintragen
  const SUPABASE_URL = "https://amtkpekufuysnxdbmkyl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_BFXO2LxmBIRN9vQqW1rVwQ_GY5XywwM";

  let alleGaeste = [];
  let aktiverFilter = "alle";

  // ── Login ─────────────────────────────────────────────────
  function tryLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === PASSWORT) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      ladeGaeste();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  // ── Daten laden ───────────────────────────────────────────
  async function ladeGaeste() {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading">Lade Daten …</td></tr>';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/gaeste?select=*&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      alleGaeste = await res.json();
      aktualisiereStats();
      zeigeTabelle();
    } catch(e) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty">Fehler beim Laden der Daten.</td></tr>';
    }
  }

  // ── Statistiken ───────────────────────────────────────────
  function aktualisiereStats() {
    const zusagen = alleGaeste.filter(g => g.status === 'Zusage');
    const absagen  = alleGaeste.filter(g => g.status === 'Absage');
    const personen = zusagen.reduce((s, g) => s + (g.Anzahl || 1), 0);
    const veg   = zusagen.filter(g => g.essengewohnheiten === 'Vegetarisch').length;
    const vegan = zusagen.filter(g => g.essengewohnheiten === 'Vegan').length;

    document.getElementById('statGesamt').textContent  = alleGaeste.length;
    document.getElementById('statZusagen').textContent = zusagen.length;
    document.getElementById('statPersonen').textContent = personen;
    document.getElementById('statAbsagen').textContent = absagen.length;
    document.getElementById('statVeg').textContent     = veg;
    document.getElementById('statVegan').textContent   = vegan;
  }

  // ── Tabelle rendern ───────────────────────────────────────
  function zeigeTabelle() {
    const suche = document.getElementById('searchInput').value.toLowerCase();
    let liste = alleGaeste;

    if (aktiverFilter !== 'alle') liste = liste.filter(g => g.status === aktiverFilter);
    if (suche) liste = liste.filter(g => g.name?.toLowerCase().includes(suche));

    if (!liste.length) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty">Keine Einträge gefunden.</td></tr>';
      return;
    }

    const rows = liste.map(g => {
      const datum = g.created_at ? new Date(g.created_at).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '–';
      const istZusage = g.status === 'Zusage';
      const badge = istZusage
        ? '<span class="badge badge-ja">✓ Zusage</span>'
        : '<span class="badge badge-nein">✗ Absage</span>';
      const essen = istZusage && g.essengewohnheiten && g.essengewohnheiten !== 'N/A'
        ? `<span class="essen-tag">${g.essengewohnheiten}</span>`
        : '<span class="muted-cell">–</span>';
      const allergie = istZusage && g.allergien && g.allergien !== 'N/A' && g.allergien !== ''
        ? g.allergien : '<span class="muted-cell">–</span>';
      const sonst = g.sonst && g.sonst !== ''
        ? g.sonst : '<span class="muted-cell">–</span>';
      const anzahl = istZusage ? (g.Anzahl || 1) : '<span class="muted-cell">–</span>';

      return `<tr>
        <td><strong>${g.name || '–'}</strong></td>
        <td>${badge}</td>
        <td>${anzahl}</td>
        <td>${essen}</td>
        <td>${allergie}</td>
        <td>${sonst}</td>
        <td class="date-cell">${datum}</td>
      </tr>`;
    }).join('');

    document.getElementById('tableBody').innerHTML = rows;
  }

  // ── Filter & Suche ────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      aktiverFilter = btn.dataset.filter;
      zeigeTabelle();
    });
  });

  document.getElementById('searchInput').addEventListener('input', zeigeTabelle);
  document.getElementById('refreshBtn').addEventListener('click', ladeGaeste);
</script>

</body>
</html>
